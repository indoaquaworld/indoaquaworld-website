            color: #fff;

            font-weight: 700;

            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }
        .event-card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .event-card .date {
            color: #7A869A;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }
        .event-card .location {
            color: #E4E5E9;
            font-size: 0.85rem;
        }
        .coming-soon {
            margin-top: 2.5rem;
            padding: 0.75rem 2rem;
            background: #0065FF;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        footer {
            margin-top: 3rem;
            color: #7A869A;
            font-size: 0.8rem;
        }
